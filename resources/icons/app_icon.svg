<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="105" fill="url(#bgGrad)" stroke="#334155" stroke-width="4" />

  <circle cx="256" cy="256" r="190" fill="none" stroke="#1e293b" stroke-width="8" opacity="0.5" />
  <circle cx="256" cy="256" r="150" fill="none" stroke="#1e293b" stroke-width="4" opacity="0.3" />

  <g filter="url(#dropShadow)">
    <path d="M 256 76 A 180 180 0 0 1 436 256" fill="none" stroke="url(#ringGrad)" stroke-width="24" stroke-linecap="round" />
    <path d="M 256 436 A 180 180 0 0 1 76 256" fill="none" stroke="url(#ringGrad)" stroke-width="24" stroke-linecap="round" />
    
    <polygon points="436,240 452,265 420,265" fill="#34d399" transform="rotate(10 436 256)" />
    <polygon points="76,272 60,247 92,247" fill="#059669" transform="rotate(10 76 256)" />
  </g>

  <g filter="url(#dropShadow)">
    <path d="M 216 130 
             L 296 130 
             L 296 250 
             L 360 250 
             L 256 364 
             L 152 250 
             L 216 250 
             Z" 
          fill="url(#arrowGrad)" />
  </g>

  <path d="M 160 390 L 352 390" fill="none" stroke="#f8fafc" stroke-width="20" stroke-linecap="round" filter="url(#glow)" opacity="0.9" />
  <path d="M 160 390 L 352 390" fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round" filter="url(#dropShadow)" />
</svg>
